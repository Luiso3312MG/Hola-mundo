<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Test SQL</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col items-center justify-center h-screen gap-6">

<h1 class="text-2xl font-bold">
Prueba de consulta SQL
</h1>

<button
id="btnConsulta"
class="bg-green-600 text-white px-6 py-3 rounded-lg"
>
Consultar email
</button>

<div id="resultado" class="text-lg"></div>

<script>

document
  .getElementById("btnConsulta")
  .addEventListener("click", async () => {

    const response = await fetch("/api/test/email");

    const data = await response.json();
    console.log(data);

    if (!data.ok) {
      document.getElementById("resultado").innerText =
        "Error: " + data.message;
      return;
    }

    document.getElementById("resultado").innerText =
      "Email desde MySQL: " + data.email;

  });

</script>

</body>
</html>
