<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Test SQL</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <h1>KBSeed Studio</h1>

  <script>
    fetch("/api/themes")
      .then(res => res.json())
      .then(data => {

        const color = data.themes[0].primary_color;

        document.body.style.backgroundColor = color;

      });
  </script>
</body>
</html>
