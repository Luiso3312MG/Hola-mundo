<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#E7C7C2",
        "accent": "#D6C3A5",
        "text-main": "#2B2B2B",
        "text-sub": "#6D6766",
        "background-light": "#F5E9E7",
        "background-dark": "#221110",
      },
      fontFamily: {
        "display": ["Manrope", "sans-serif"]
      }
    },
  },
}
</script>

<title>Admin Login | Pole & Barre</title>
</head>

<body class="bg-background-light font-display text-text-main min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-[440px] flex flex-col items-center">

<!-- Logo -->
<div class="mb-10 flex flex-col items-center gap-3">
<div class="size-12 bg-white rounded-full flex items-center justify-center shadow-sm text-primary">
<svg class="w-8 h-8" fill="none" viewBox="0 0 48 48">
<path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="text-2xl font-bold tracking-tight uppercase">Pole & Barre</h1>
</div>

<!-- Card -->
<div class="w-full bg-white rounded-xl shadow-xl shadow-primary/10 border border-primary/20 p-8 md:p-10">

<div class="mb-8">
<h2 class="text-xl font-bold">Iniciar Sesión</h2>
<p class="text-text-sub text-sm mt-1">Panel de Administración del Studio</p>
</div>

<form id="loginForm" class="space-y-5">

<!-- Email -->
<div class="space-y-2">
<label class="text-sm font-semibold ml-1">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent text-[20px]">mail</span>
<input 
id="email"
class="w-full pl-11 pr-4 h-12 bg-background-light/30 border border-primary/30 rounded-lg focus:ring-2 focus:ring-primary outline-none"
placeholder="admin@poleandbarre.com"
type="email"
required
/>
</div>
</div>

<!-- Password -->
<div class="space-y-2">
<label class="text-sm font-semibold ml-1">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent text-[20px]">lock</span>
<input 
id="password"
class="w-full pl-11 pr-12 h-12 bg-background-light/30 border border-primary/30 rounded-lg focus:ring-2 focus:ring-primary outline-none"
placeholder="••••••••"
type="password"
required
/>
</div>
</div>

<!-- Remember -->
<div class="flex items-center gap-2 ml-1">
<input id="remember" type="checkbox" class="h-4 w-4"/>
<label class="text-sm text-text-sub">Recordar sesión</label>
</div>

<!-- Button -->
<button 
type="submit"
class="w-full h-12 bg-primary hover:bg-primary/90 font-bold rounded-lg shadow-lg shadow-primary/20 transition-all">
Ingresar al Panel
</button>

</form>
</div>

<footer class="mt-12 text-center text-xs text-text-sub/60">
© 2024 Pole & Barre Studio Admin
</footer>

</div>

<!-- JS -->
<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {
  event.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;

  console.log("Email:", email);
  console.log("Password:", password);
  console.log("Recordar sesión:", remember);

  alert("Datos capturados. Revisa la consola (F12).");
});
</script>

</body>
</html>
